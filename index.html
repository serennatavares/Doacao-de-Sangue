<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="style.css">
    <title>Sistema de Captação de Dados para Doação de Sangue</title>
</head>
<body>

    <h1>Sistema de Captação de Dados para Doação de Sangue</h1>

    <form id="formDoacao">

    <label for="nome">Nome:</label>
    <input type="text" id="nome" name="nome" placeholder="Digite o nome."><br><br>

    <label for="sobrenome">Sobrenome:</label>
    <input type="text" id="sobrenome" name="sobrenome" placeholder="Digite o sobrenome."><br><br>

    <label for="email">Email:</label>
    <input type="email" id="email" name="email" placeholder="Digite o email."><br><br>

    <label for="idade">Idade:</label>
    <input type="number" id="idade" name="idade" placeholder="Digite a idade."><br><br>

    <label for="peso">Peso (kg):</label>
    <input type="number" id="peso" name="peso" placeholder="Digite o peso."><br><br>

    <label for="tipo">Tipo sanguíneo:</label>
    <select id="tipo" name="tipo" required>
        <option value="">Selecione</option>
        <option value="A+">A+</option>
        <option value="A-">A-</option>
        <option value="B+">B+</option>
        <option value="B-">B-</option>
        <option value="AB+">AB+</option>
        <option value="AB-">AB-</option>
        <option value="O+">O+</option>
        <option value="O-">O-</option>
    </select><br><br>

    <label for="telefone">Telefone:</label>
    <input type="tel" id="telefone" name="telefone" placeholder="Digite o telefone"><br><br>

    <label for="cidade">Cidade:</label>
    <input type="text" id="cidade" name="cidade" placeholder="Digite a cidade"><br><br>

    <label for="estado">Estado:</label>
    <input type="text" id="estado" name="estado" placeholder="Digite o estado"><br><br>

    <button type="submit">Enviar</button>

    </form>

    <script src="scripts/script.js"></script>

    <img id="gif-flutuante" src="assets/'hikaru'.png" alt="'hikaru'"> 


</body>
</html>
